services:
  kora:
    build: .
    container_name: kora-bench
    ports:
      - "6399:6379"
    deploy:
      resources:
        limits:
          cpus: "${BENCH_CPUS:-4.0}"
          memory: "${BENCH_MEM:-512M}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  redis:
    image: redis:8-alpine
    container_name: redis-bench
    command: ["redis-server", "--bind", "0.0.0.0", "--save", "", "--appendonly", "no"]
    ports:
      - "6400:6379"
    deploy:
      resources:
        limits:
          cpus: "${BENCH_CPUS:-4.0}"
          memory: "${BENCH_MEM:-512M}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: dragonfly-bench
    command: ["--bind", "0.0.0.0", "--port", "6379", "--cache_mode", "--proactor_threads", "2"]
    ports:
      - "6401:6379"
    deploy:
      resources:
        limits:
          cpus: "${BENCH_CPUS:-4.0}"
          memory: "${DRAGONFLY_MEM:-1536M}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6379' 2>/dev/null || true"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s
